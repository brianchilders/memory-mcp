<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}memory-mcp{% endblock %} — Admin</title>
  <link rel="stylesheet" href="/static/vendor/css/bootstrap.min.css">
  <script src="/static/vendor/js/bootstrap.bundle.min.js" defer></script>
  <script src="/static/vendor/js/htmx.min.js" defer></script>
  <style>
    body { background: #f8f9fa; }
    .nav-brand { font-weight: 700; letter-spacing: -0.5px; }
    .stat-card { border-left: 4px solid #0d6efd; }
    .stat-number { font-size: 2rem; font-weight: 700; line-height: 1; }
    .badge-category { font-size: 0.7rem; }
    pre.fact { white-space: pre-wrap; word-break: break-word; margin: 0; }
    .reading-row td { font-size: 0.875rem; }
    .confidence-bar { height: 4px; background: #dee2e6; border-radius: 2px; }
    .confidence-fill { height: 4px; background: #0d6efd; border-radius: 2px; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
  <div class="container-fluid">
    <span class="navbar-brand nav-brand">memory-mcp admin</span>
    <div class="d-flex gap-3">
      <a class="nav-link text-light" href="/admin/">Dashboard</a>
      <a class="nav-link text-light" href="/admin/entities">Entities</a>
      <a class="nav-link text-light" href="/admin/readings">Readings</a>
      <a class="nav-link text-light" href="/admin/settings">Settings</a>
    </div>
  </div>
</nav>

<div class="container-fluid px-4">
  {% block content %}{% endblock %}
</div>

</body>
</html>
