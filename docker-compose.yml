services:
  memory-mcp:
    build: .
    container_name: memory-mcp
    restart: unless-stopped
    ports:
      - "8900:8900"
    volumes:
      - memory-data:/app/data
    env_file:
      - .env
    environment:
      # Database inside the named volume
      MEMORY_DB_PATH: /app/data/memory.db
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8900/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  memory-data:
    driver: local
